baseURL = 'https://griffiths.cymru/'
title = 'griffiths.cymru'
theme = 'PaperMod'
defaultContentLanguage = 'en'
contentDir = 'content/en'

[[menus.main]]
  identifier = 'home'
  name = 'Home'
  url = '/'
  weight = 1
[[menus.main]]
  identifier = 'about'
  name = 'About'
  url = '/about/'
  weight = 2
[[menus.main]]
  identifier = 'projects'
  name = 'Projects'
  url = '/projects/'
  weight = 3
[[menus.main]]
  identifier = 'blog'
  name = 'Blog'
  url = '/blog/'
  weight = 4
[[menus.main]]
  identifier = 'contact'
  name = 'Contact'
  url = '/contact/'
  weight = 5

[params]
  author = 'Christopher Griffiths'
  description = 'Christopher Griffiths personal website'
  env = 'production'
  showReadingTime = true
  showShareButtons = false
  showBreadCrumbs = true
  showPostNavLinks = true
  defaultTheme = 'auto'
  ShowCodeCopyButtons = true

  [params.homeInfoParams]
    Title = 'Christopher Griffiths'
    Content = ''

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/cadfan'

[outputs]
  home = ['HTML', 'RSS']

[markup]
  [markup.highlight]
    style = 'monokai'

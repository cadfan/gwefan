baseURL = 'https://griffiths.cymru/'
title = 'griffiths.cymru'
theme = 'PaperMod'
defaultContentLanguage = 'en'
contentDir = 'content/en'

[[menus.main]]
  identifier = 'home'
  name = 'Home'
  url = '/'
  weight = 1
[[menus.main]]
  identifier = 'about'
  name = 'About'
  url = '/about/'
  weight = 2
[[menus.main]]
  identifier = 'projects'
  name = 'Projects'
  url = '/projects/'
  weight = 3
[[menus.main]]
  identifier = 'blog'
  name = 'Blog'
  url = '/blog/'
  weight = 4
[[menus.main]]
  identifier = 'contact'
  name = 'Contact'
  url = '/contact/'
  weight = 5

[params]
  author = 'Christopher Griffiths'
  description = 'Christopher Griffiths personal website'
  env = 'production'
  showReadingTime = true
  showShareButtons = false
  showAuthor = false
  showBreadCrumbs = true
  showPostNavLinks = true
  defaultTheme = 'auto'
  ShowCodeCopyButtons = true

  [params.label]
    text = 'griffiths.cymru'

  [params.cover]
    hiddenInList = true

  [params.assets]
    theme_color = '#1a1b1e'
    msapplication_TileColor = '#1a1b1e'

  [params.homeInfoParams]
    Title = 'Christopher Griffiths'
    Content = """Independent builder focused on practical software systems, \
particularly in health data, simulation tooling and self-hosted infrastructure.

### Areas of interest

— Sim racing tooling and telemetry workflows  \n\
— Local-first health data and glucose modelling  \n\
— Self-hosted systems and infrastructure  \n\
— Welsh language and technology"""

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/cadfan'

[outputs]
  home = ['HTML', 'RSS']

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = 'monokai'
